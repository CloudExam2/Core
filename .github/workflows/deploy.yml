name: "Core CI/CD"

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Allows manual trigger from the UI

jobs:
  terraform:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./terraform

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      TF_VAR_github_token: ${{ secrets.GH_PAT }} 
      TF_VAR_catalog_backend_url: ${{ vars.CATALOG_BACKEND_URL }} 
      TF_VAR_sales_backend_url: ${{ vars.SALES_BACKEND_URL }} 
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init -upgrade

      - name: Terraform Plan
        run: terraform plan

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve

      - name: Core outputs (job summary)
        if: github.ref == 'refs/heads/main'
        working-directory: ./terraform
        env:
          AWS_REGION: us-east-1
        run: |
          VPC_ID=$(terraform output -raw vpc_id 2>/dev/null || echo "n/a")
          CAT_VAR="${TF_VAR_catalog_backend_url:-}"
          SAL_VAR="${TF_VAR_sales_backend_url:-}"
          GW=$(terraform output -raw api_gateway_invoke_url 2>/dev/null || true)

          live_ips() {
            local tag="$1"
            aws ec2 describe-instances --region "$AWS_REGION" \
              --filters "Name=tag:Name,Values=${tag}" "Name=instance-state-name,Values=running,pending,stopped" \
              --query 'Reservations[].Instances[].[InstanceId,State.Name,PublicIpAddress]' \
              --output text 2>/dev/null || true
          }

          CAT_LIVE=$(live_ips "Catalog-Service")
          SAL_LIVE=$(live_ips "Sales-Service")

          {
            echo "## Core"
            echo "VPC \`${VPC_ID}\`"
            echo ""
            echo "**Catalog** (GitHub var): ${CAT_VAR:-_not set_}"
            echo "**Catalog** (live EC2 tag \`Catalog-Service\`):"
            if [ -z "$CAT_LIVE" ]; then echo "_no instances_"; else echo "\`\`\`"; echo "$CAT_LIVE"; echo "\`\`\`"; fi
            echo ""
            echo "**Sales** (GitHub var): ${SAL_VAR:-_not set_}"
            echo "**Sales** (live EC2 tag \`Sales-Service\`):"
            if [ -z "$SAL_LIVE" ]; then echo "_no instances_"; else echo "\`\`\`"; echo "$SAL_LIVE"; echo "\`\`\`"; fi
            if [ "$(echo "$SAL_LIVE" | wc -l)" -gt 1 ]; then
              echo ""
              echo "::warning::More than one \`Sales-Service\` instance — terminate orphans in AWS console, then re-run Sales + Core CI."
            fi
            if [ -n "$GW" ]; then echo ""; echo "API GW → \`${GW}\`"; fi
          } >> "$GITHUB_STEP_SUMMARY"