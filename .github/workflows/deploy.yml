name: "Core CI/CD"

on:
  workflow_dispatch: 

jobs:
  terraform:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./terraform

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      TF_VAR_github_token: ${{ secrets.GH_PAT }} 
      TF_VAR_catalog_backend_url: ${{ vars.CATALOG_BACKEND_URL }} 
      TF_VAR_sales_backend_url: ${{ vars.SALES_BACKEND_URL }} 
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init -upgrade

      - name: Terraform Plan
        run: terraform plan

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve

      - name: Core outputs (job summary)
        if: github.ref == 'refs/heads/main'
        working-directory: ./terraform
        env:
          AWS_REGION: us-east-1
        run: |
          VPC_ID=$(terraform output -raw vpc_id 2>/dev/null || echo "n/a")
          LOG_CAT=$(terraform output -raw catalog_log_group_name 2>/dev/null || echo "")
          LOG_SAL=$(terraform output -raw sales_log_group_name 2>/dev/null || echo "")
          GW=$(terraform output -raw api_gateway_invoke_url 2>/dev/null || true)

          eip_ip() {
            aws ec2 describe-addresses --region "$AWS_REGION" \
              --filters "Name=tag:Name,Values=$1" \
              --query 'Addresses[0].PublicIp' --output text 2>/dev/null \
              | grep -v '^None$' || true
          }

          CAT_EIP=$(eip_ip "catalog-service-eip")
          SAL_EIP=$(eip_ip "sales-service-eip")

          url_line() {
            local ip="$1"
            if [ -n "$ip" ] && [ "$ip" != "None" ]; then
              echo "- http://${ip}/ (health) · http://${ip}/docs (swagger)"
            else
              echo "- _EIP not found — run Catalog/Sales CI (terraform apply)_"
            fi
          }

          {
            echo "## Core — service URLs"
            echo ""
            echo "### Catalog (Elastic IP)"
            url_line "$CAT_EIP"
            echo ""
            echo "### Sales (Elastic IP)"
            url_line "$SAL_EIP"
            echo ""
            echo "VPC \`${VPC_ID}\`"
            if [ -n "$LOG_CAT" ]; then echo "Catalog logs → \`${LOG_CAT}\` · filter inter-service: \`catalog.inbound\`"; fi
            if [ -n "$LOG_SAL" ]; then echo "Sales logs → \`${LOG_SAL}\` · filter inter-service: \`sales.catalog\`"; fi
            DASH_URL=$(terraform output -raw ec2_metrics_dashboard_url 2>/dev/null || echo "")
            DASH_CAT=$(terraform output -raw dashboard_catalog_instance_id 2>/dev/null || echo "")
            DASH_SAL=$(terraform output -raw dashboard_sales_instance_id 2>/dev/null || echo "")
            if [ -n "$DASH_URL" ]; then
              echo ""
              echo "**Metrics dashboard** (CPU, NetworkIn, HTTP %): [Exam2-EC2-Overview](${DASH_URL})"
              echo "- Catalog instance: \`${DASH_CAT:-not in state}\`"
              echo "- Sales instance: \`${DASH_SAL:-not in state}\`"
            fi
            CPU_SNS=$(terraform output -raw cpu_alerts_sns_topic_arn 2>/dev/null || echo "")
            if [ -n "$CPU_SNS" ]; then
              echo ""
              echo "**CPU alarm** >70% → email (confirm SNS once): \`${CPU_SNS}\`"
              echo "Spike tests: \`pytest tests/test_cpu_spike.py -m seed\` in Catalog and Sales repos."
            fi
            if [ -n "$GW" ]; then echo "API GW → \`${GW}\`"; fi
          } >> "$GITHUB_STEP_SUMMARY"