name: "Core CI/CD"

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Allows manual trigger from the UI

jobs:
  terraform:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./terraform

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      TF_VAR_github_token: ${{ secrets.GH_PAT }} 
      TF_VAR_catalog_backend_url: ${{ vars.CATALOG_BACKEND_URL }} 
      TF_VAR_sales_backend_url: ${{ vars.SALES_BACKEND_URL }} 
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init -upgrade

      - name: Terraform Plan
        run: terraform plan

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve

      - name: Core outputs (job summary)
        if: github.ref == 'refs/heads/main'
        working-directory: ./terraform
        env:
          AWS_REGION: us-east-1
        run: |
          VPC_ID=$(terraform output -raw vpc_id 2>/dev/null || echo "n/a")
          CAT_VAR="${TF_VAR_catalog_backend_url:-}"
          SAL_VAR="${TF_VAR_sales_backend_url:-}"
          GW=$(terraform output -raw api_gateway_invoke_url 2>/dev/null || true)

          eip_ip() {
            aws ec2 describe-addresses --region "$AWS_REGION" \
              --filters "Name=tag:Name,Values=$1" \
              --query 'Addresses[0].PublicIp' --output text 2>/dev/null \
              | grep -v '^None$' || true
          }

          CAT_EIP=$(eip_ip "catalog-service-eip")
          SAL_EIP=$(eip_ip "sales-service-eip")

          url_line() {
            local ip="$1"
            if [ -n "$ip" ] && [ "$ip" != "None" ]; then
              echo "- http://${ip}/ (health) · http://${ip}/docs (swagger)"
            else
              echo "- _EIP not found — run Catalog/Sales CI (terraform apply)_"
            fi
          }

          {
            echo "## Core — service URLs"
            echo ""
            echo "### Catalog (Elastic IP — use these)"
            url_line "$CAT_EIP"
            echo ""
            echo "### Sales (Elastic IP — use these)"
            url_line "$SAL_EIP"
            echo ""
            echo "### GitHub vars on Core repo (for API Gateway; refresh when Catalog/Sales terraform runs)"
            echo "- \`CATALOG_BACKEND_URL\`: ${CAT_VAR:-_not set_}"
            echo "- \`SALES_BACKEND_URL\`: ${SAL_VAR:-_not set_}"
            if [ -n "$CAT_EIP" ] && [ -n "$CAT_VAR" ] && [ "$CAT_VAR" != "http://${CAT_EIP}:80" ] && [ "$CAT_VAR" != "http://${CAT_EIP}" ]; then
              echo "::warning::Catalog GitHub var does not match live EIP — re-run **Catalog** CI."
            fi
            if [ -n "$SAL_EIP" ] && [ -n "$SAL_VAR" ] && [ "$SAL_VAR" != "http://${SAL_EIP}:80" ] && [ "$SAL_VAR" != "http://${SAL_EIP}" ]; then
              echo "::warning::Sales GitHub var does not match live EIP — re-run **Sales** CI."
            fi
            echo ""
            echo "VPC \`${VPC_ID}\`"
            if [ -n "$GW" ]; then echo "API GW → \`${GW}\`"; fi
          } >> "$GITHUB_STEP_SUMMARY"