name: "Core CI/CD"

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Allows manual trigger from the UI

jobs:
  terraform:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./terraform

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      TF_VAR_github_token: ${{ secrets.GH_PAT }} 
      TF_VAR_catalog_backend_url: ${{ vars.CATALOG_BACKEND_URL }} 
      TF_VAR_sales_backend_url: ${{ vars.SALES_BACKEND_URL }} 
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init -upgrade

      - name: Terraform Plan
        run: terraform plan

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve

      - name: Core outputs (job summary)
        if: github.ref == 'refs/heads/main'
        working-directory: ./terraform
        run: |
          VPC_ID=$(terraform output -raw vpc_id 2>/dev/null || echo "n/a")
          CAT="${TF_VAR_catalog_backend_url:-}"
          SAL="${TF_VAR_sales_backend_url:-}"
          GW=$(terraform output -raw api_gateway_invoke_url 2>/dev/null || true)
          {
            echo "## Core"
            echo "VPC \`${VPC_ID}\` · proxy path \`/catalog/{proxy+}\` (needs \`gateway.tf\`)"
            echo ""
            if [ -n "$CAT" ]; then echo "Catalog → \`${CAT}\`"; else echo "Catalog → _set \`CATALOG_BACKEND_URL\` after Catalog CI_"; fi
            if [ -n "$SAL" ]; then echo "Sales → \`${SAL}\`"; else echo "Sales → _set \`SALES_BACKEND_URL\` after Sales CI_"; fi
            if [ -n "$GW" ]; then echo "API GW → \`${GW}\`"; fi
          } >> "$GITHUB_STEP_SUMMARY"